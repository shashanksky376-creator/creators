<!DOCTYPE html>
<html>
<head>
<title>Sync Razorpay → Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family:monospace;padding:20px;background:#111;color:#0f0">
<h2 style="color:#fff">Razorpay → Supabase Sync</h2>
<pre id="log">Starting...</pre>
<script>
const SUPABASE_URL = "https://qezdknrauecfankgfhtt.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlemRrbnJhdWVjZmFua2dmaHR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTkyODcsImV4cCI6MjA4OTA5NTI4N30.wEZEMIUrB_Z4OqPcIl2ptPCHyiZY1xNWN8QexvRwk_0";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// The 3 confirmed captured payments from Razorpay API
const payments = [
  { id: "pay_SYe2BwRFmLpkiV", email: "kishorkumarns09@gmail.com", contact: "+918618247584", amount: 1999, name: "Kishor Kumar" },
  { id: "pay_SYeQIV2GqFmkGQ", email: "gowdakavyasupardi@gmail.com", contact: "+91", amount: 1999, name: "Gowda Kavya" },
  { id: "pay_SYXJRJ4Hak7g2L", email: "rajupggatonar@gmail.com", contact: "+91", amount: 1999, name: "Raju PG" },
];

const log = document.getElementById('log');
function addLog(msg) { log.textContent += '\n' + msg; }

async function sync() {
  for (const p of payments) {
    const email = p.email.toLowerCase().trim();
    const phone = p.contact.replace('+91','').trim() || null;
    addLog(`Syncing: ${email}...`);
    const { error } = await db.from('enrolled_users').upsert([{
      email,
      full_name: p.name,
      phone: phone || null,
      razorpay_payment_id: p.id,
      enrolled_at: new Date().toISOString(),
    }], { onConflict: 'email' });
    if (error) {
      addLog('❌ ERROR: ' + JSON.stringify(error));
    } else {
      addLog('✅ Synced: ' + email);
    }
  }
  addLog('\n✅ Done! All 3 real customers are now in your database.');
}
sync();
</script>
</body>
</html>
