<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Student Portal [PREVIEW] | SHASHANK KY</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f8312f;
      --primary-glow: rgba(248, 49, 47, 0.4);
      --dark: #0a0a0c;
      --darker: #050507;
      --card: rgba(18, 18, 22, 0.6);
      --border: rgba(255, 255, 255, 0.05);
      --glass-bg: rgba(12, 12, 14, 0.8);
      --accent: #6366f1;
    }
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--darker); 
      color: #fafafa; 
      overflow-x: hidden; 
      letter-spacing: -0.01em;
      background-image: radial-gradient(circle at 0% 0%, rgba(248, 49, 47, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(99, 102, 241, 0.03) 0%, transparent 50%);
    }
    h1, h2, h3, h4, .font-display { font-family: 'Outfit', sans-serif; }
    
    .sidebar { width: 280px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; background: #080808; border-right: 1px solid var(--border); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .main-content { margin-left: 280px; min-height: 100vh; }
    .glass { background: var(--card); backdrop-filter: blur(24px) saturate(180%); border: 1px solid var(--border); }
    
    .module-card {
      background: linear-gradient(90deg, rgba(20, 20, 20, 0.8) 0%, rgba(10, 10, 10, 0.95) 100%);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 24px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      gap: 32px;
    }
    .module-poster {
      width: 100px; height: 100px; border-radius: 20px; background: linear-gradient(135deg, #121212 0%, #050505 100%);
      display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
    }
    .lesson-item {
      transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; background: rgba(255,255,255,0.02);
      padding: 16px; cursor: pointer; display: flex; items-center; gap: 16px;
    }
    .lesson-item:hover { background: rgba(232, 33, 43, 0.1); border-color: rgba(232, 33, 43, 0.2); }
    .lesson-item.active { background: rgba(232, 33, 43, 0.2); border-color: var(--primary); }

    .video-wrap {
      aspect-ratio: 16/9; background: #000; border-radius: 32px; overflow: hidden;
      border: 1px solid var(--border); box-shadow: 0 40px 100px -20px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body class="custom-scroll">

  <!-- PREVIEW PROTECTION BYPASS -->
  <script>
    window.ENROLLED_USER = { fullName: "Preview Student", email: "preview@example.com" };
    window.IS_ADMIN = true;
    console.log("🛠️ Dashboard Preview Mode: Offline Testing Enabled");
  </script>

  <aside class="sidebar flex flex-col p-6">
    <div class="mb-10 px-2 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-red-600 flex items-center justify-center text-white">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
        </div>
        <div class="flex flex-col">
          <span class="text-lg font-black tracking-widest uppercase text-white leading-none">Affiliate<span class="text-red-500">PRO</span></span>
          <span class="text-[9px] text-gray-400 font-bold tracking-[0.2em] uppercase mt-1">Preview Mode</span>
        </div>
      </div>
    </div>

    <nav class="flex-1 space-y-2 mt-6">
      <div class="flex items-center gap-4 px-5 py-3.5 rounded-2xl bg-red-600/10 text-red-500 border border-red-500/10 font-bold text-sm">Course Dashboard</div>
      <a href="admin-preview.html" class="flex items-center gap-4 px-5 py-3.5 rounded-2xl bg-amber-500/5 text-amber-500 border border-amber-500/10 font-bold text-sm hover:bg-amber-500/10 transition-all">Admin Panel [PREVIEW]</a>
    </nav>

    <div class="mt-auto p-4 glass rounded-2xl">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-primary flex items-center justify-center text-white font-black">P</div>
        <div>
          <span class="text-xs font-black text-white uppercase">PREVIEW STUDENT</span>
          <div class="text-[9px] text-gray-400 font-bold">@preview_insta</div>
          <div class="text-[9px] text-gray-500 font-bold">preview@example.com</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="max-w-7xl mx-auto p-12 space-y-12 pb-32">
      <header class="flex items-center justify-between">
        <h1 class="text-5xl font-black text-white uppercase tracking-tight">Student <span class="text-red-500 italic">Portal</span></h1>
        <div class="px-4 py-2 bg-white/5 border border-white/5 rounded-full text-[10px] font-black uppercase tracking-widest text-emerald-500">Preview Data Enabled</div>
      </header>

      <div class="video-wrap relative bg-dark overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-[#121214] to-[#08080a] flex flex-col items-center justify-center p-8 text-center">
            <div class="w-20 h-20 rounded-3xl bg-red-600/10 flex items-center justify-center text-red-500 mb-8 border border-red-500/10">
              <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path></svg>
            </div>
            <h2 class="text-2xl font-black uppercase mb-4 tracking-[0.2em] text-white">Course Video</h2>
            <p class="text-gray-500 text-sm max-w-sm">Video playback is disabled in standard preview. Use theMember Portal for live video.</p>
        </div>
      </div>

      <div id="module-container" class="space-y-6">
        <!-- Content will be injected -->
      </div>
    </div>
  </main>

  <script>
    const courseData = [
      { num: "1", title: "Welcome to the Course", desc: "Mindset and roadmap for affiliate success.", tag: "WELCOME", color: "red" },
      { num: "2", title: "Instagram Account Setup", desc: "Build an optimized business presence.", tag: "SETUP", color: "blue" },
      { num: "3", title: "Affiliate Platforms", desc: "Finding high-paying products.", tag: "NETWORK", color: "purple" }
    ];

    document.getElementById('module-container').innerHTML = courseData.map(mod => `
      <div class="module-card group/card">
        <div class="module-poster">
          <span class="text-2xl font-black text-white/20">${mod.num}</span>
        </div>
        <div class="flex-1 space-y-3">
          <div class="flex items-center justify-between">
            <span class="text-[9px] font-black text-${mod.color}-500 uppercase tracking-[0.2em]">${mod.tag}</span>
            <span class="px-2 py-1 bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 text-[8px] font-black uppercase rounded">Unlocked</span>
          </div>
          <h4 class="text-xl font-bold text-white tracking-tight">${mod.title}</h4>
          <p class="text-gray-500 text-xs leading-relaxed max-w-xl">${mod.desc}</p>
          <div class="lesson-item active">
             <div class="w-8 h-8 rounded-lg bg-red-600 flex items-center justify-center text-[10px] font-black text-white">01</div>
             <span class="text-xs font-bold text-white">Full Video Lesson</span>
          </div>
        </div>
      </div>
    `).join('');
  </script>
</body>
</html>
